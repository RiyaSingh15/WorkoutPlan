<meta name="theme-color" content="#EEF1F6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0A0D13" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">

<link rel="manifest" href="manifest.webmanifest">

<script>try{var t=localStorage.getItem("theme");if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="topbar-text">
      <p class="eyebrow">Month 2 · Push / Pull / Legs ×2</p>
      <h1>Workout Plan</h1>
    </div>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
      <svg class="moon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
      <svg class="sun" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    </button>
  </header>

  <nav class="daynav" id="daynav" aria-label="Jump to a day"></nav>

  <!--
    Notes kept for next month's plan review (not shown in the UI):

    Injury considerations:
    - Left knee: controlled tempo, moderate depth, stop on sharp pain; gentle loading
      helps rebuild strength.
    - Rod (lower left leg): calf and shin-loading moves should start light; skip if you
      feel hardware irritation. Surgeon-cleared for weight training.

    4-Week Progression:
    - W1 (Foundation): Sets as written · top of rep range · RPE 7 · rest as listed
      (90–120s on hip thrust/presses/hack squat) · cardio 10–15 min ×3
    - W2 (Build): Once every set hits the top of its range, add ~5% load and reset to the
      bottom · +1 set on main lifts · RPE 7–8 · cardio 15–20 min ×3
    - W3 (Peak): Drop set on lateral raises & leg extension · rest-pause on the last
      triceps move · heavier compounds · RPE 8–9 · hardest HIIT
    - W4 (Deload): ~2 sets · 60–70% load · RPE 5–6 · light cardio. Lets your leg and
      nervous system rebound.
  -->

  <section>
    <h2 class="sec-title">The Week</h2>
    <div id="days"></div>
  </section>

  <footer>4-week block · reassess after Week 4</footer>
</div>

<button class="fab" id="toTop" aria-label="Back to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script src="js/data.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
